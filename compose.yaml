services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/runtime/data
      - ./logs:/runtime/logs
      - ./artifacts:/runtime/artifacts
      - ./workspaces:/runtime/workspaces
